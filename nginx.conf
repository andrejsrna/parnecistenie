server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # _next/static — agresívne cachovanie (content hash v názve súboru)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Statické assety (logo, favicon, obrázky)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Hlavné routovanie — Next.js static export
    # Trailing slash redirect: /tepovanie-sedaciek/ → /tepovanie-sedaciek
    # (okrem rootu /)
    rewrite ^(.+)/$ $1 permanent;

    location / {
        try_files $uri $uri.html $uri/index.html =404;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header X-Frame-Options         "SAMEORIGIN"                    always;
        add_header X-XSS-Protection        "1; mode=block"                 always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    }

    # Vlastná 404 stránka
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
